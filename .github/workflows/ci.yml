name: MLflow CI Retraining & Docker Build

on:
  push:
    branches: [ main ]

jobs:
  retrain-and-docker:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        pip install mlflow dagshub pandas scikit-learn PySastrawi joblib

    - name: Check Directory Structure
      run: ls -R  # Ini akan membantu kita melihat posisi file di log

    - name: MLflow Run (Retraining)
      env:
        MLFLOW_TRACKING_URI: https://dagshub.com/pyogaaa/Eksperimen_SML.mlflow
        MLFLOW_TRACKING_USERNAME: pyogaaa
        MLFLOW_TRACKING_PASSWORD: MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        GITHUB_ACTIONS: true
      run: |
        # Menggunakan ./ memastikan MLflow membacanya sebagai folder lokal
        mlflow run ./MLProject_folder --experiment-name "Retraining_CI" --env-manager local

    - name: Wait for Registry
      run: sleep 60

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image via MLflow
      env:
        MLFLOW_TRACKING_URI: https://dagshub.com/pyogaaa/Eksperimen_SML.mlflow
        MLFLOW_TRACKING_USERNAME: pyogaaa
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        # Pastikan model registry sudah terbaca di DagsHub
        mlflow models build-docker \
          -m "models:/Mobile_Legends_Sentiment/latest" \
          -n "${{ secrets.DOCKERHUB_USERNAME }}/mlflow-model:latest" \
          --install-mlflow

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlflow-model:latest